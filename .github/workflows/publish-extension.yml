name: Publish VS Code Extension

on:
  release:
    types: [published]

jobs:
  package-vscode:
    if: startsWith(github.ref, 'refs/tags/ext-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Setup Node
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: 22

    - name: Bump version in package.json
      working-directory: editors/vscode
      run: |
        VERSION="${{ github.ref_name }}"
        VERSION="${VERSION#ext-v}"
        npm version "$VERSION" --no-git-tag-version

    - name: Install dependencies
      working-directory: editors/vscode
      run: npm ci

    - name: Copy LICENSE
      run: cp LICENSE editors/vscode/LICENSE

    - name: Build extension
      working-directory: editors/vscode
      run: npm run build

    - name: Package extension
      working-directory: editors/vscode
      run: npx @vscode/vsce package

    - name: Upload to release
      working-directory: editors/vscode
      run: gh release upload ${{ github.ref_name }} *.vsix
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Commit version bump
      run: |
        VERSION="${{ github.ref_name }}"
        VERSION="${VERSION#ext-v}"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add editors/vscode/package.json editors/vscode/package-lock.json
        git commit -m "chore: bump VS Code extension version to $VERSION"
        git push origin HEAD:main
